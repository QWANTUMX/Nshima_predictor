<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nshima GL Predictor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="card shadow-sm mx-auto" style="max-width: 450px;">
            <div class="card-header bg-dark text-white text-center">
                <h4>Nshima GL Predictor</h4>
            </div>
            <div class="card-body">
                <form action="/predict" method="POST">
                    <div class="mb-3">
                        <label class="form-label">Portion (grams)</label>
                        <input type="number" name="portion" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Staple Food</label>
                        <select name="food_type" class="form-select">
                            <option value="Maize Nshima">Maize Nshima</option>
                            <option value="Cassava Nshima">Cassava Nshima</option>
                            <option value="White Rice">White Rice</option>
                            <option value="Sweet Potato">Sweet Potato</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Predict</button>
                </form>

                {% if result %}
                <div class="mt-4 alert alert-success text-center">
                    <strong>Result:</strong> {{ result }}
                </div>
                {% endif %}
            </div>
        </div>
    </div>
</body>
</html>
